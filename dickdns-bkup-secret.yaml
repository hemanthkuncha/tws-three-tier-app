### Using the Backup (To avoid limits):

1. Create NS: 'kubectl create ns three-tier'

2. Apply Secret: 'kubectl apply -f myapp-tls-prod-backup.yaml'

3. Apply App: (Deployments/Services)

4. Apply "Quiet" Ingress: Apply the Ingress without the cluster-issuer annotation.

Result: Website works instantly with the old cert. No rate limit hit.

Comment this in Ingress.yaml

# cert-manager.io/cluster-issuer: "letsencrypt-prod"  <-- REMOVE/COMMENT THIS 
