apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-pv-tws
spec:
  capacity: 
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: manual
  hostPath:
    path: /mnt/data/three-tier/db
    type: DirectoryOrCreate
